<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTL Visualization: GPU + Memory Subsystem</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 1600px;
            overflow-x: auto;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        svg {
            border: 1px solid #999;
            background-color: #fff;
        }
        .module-box {
            fill: #fff;
            stroke: #000;
            stroke-width: 2px;
        }
        .memory-box {
            fill: #e8f0fe;
            stroke: #1a73e8;
            stroke-width: 2px;
        }
        .external-box {
            fill: #fff3e0;
            stroke: #e65100;
            stroke-width: 2px;
            stroke-dasharray: 4;
        }
        .module-title {
            font-size: 14px;
            font-weight: bold;
            font-family: sans-serif;
            fill: #000;
            text-anchor: middle;
            text-transform: uppercase;
        }
        .sub-module-box {
            fill: #f9f9f9;
            stroke: #333;
            stroke-width: 1px;
        }
        .register-box {
            fill: #e0e0e0;
            stroke: #333;
            stroke-width: 1px;
        }
        .register-text {
            font-size: 10px;
            fill: #000;
            font-family: 'Courier New', monospace;
            text-anchor: start;
        }
        .wire {
            stroke: #666;
            stroke-width: 1.5px;
            fill: none;
            marker-end: url(#arrow);
        }
        .bus {
            stroke: #666;
            stroke-width: 2.5px;
            fill: none;
            marker-end: url(#arrow);
        }
        .label {
            font-size: 11px;
            fill: #444;
            text-anchor: middle;
            font-style: italic;
        }
        .group-label {
            font-size: 12px;
            font-weight: bold;
            fill: #333;
            text-anchor: start;
        }
        .port-text {
            font-size: 10px;
            fill: #e65100;
            font-weight: bold;
            text-anchor: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SystemVerilog RTL: GPU Core & Memory Architecture</h1>
    
    <svg width="1400" height="1000" viewBox="0 0 1400 1000">
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#666" />
            </marker>
        </defs>

        <rect x="10" y="10" width="1380" height="980" class="module-box" rx="5" ry="5"/>
        <text x="700" y="35" class="module-title">GPU TOP LEVEL (gpu.sv)</text>

        <g transform="translate(850, 60)">
            <rect x="0" y="0" width="480" height="850" style="fill:none; stroke:#1a73e8; stroke-dasharray:5; stroke-width:1"/>
            <text x="20" y="20" class="group-label" style="fill:#1a73e8">MEMORY SUBSYSTEM</text>

            <g transform="translate(260, 50)">
                <rect x="0" y="0" width="180" height="100" class="external-box"/>
                <text x="90" y="30" class="module-title" style="fill:#e65100">EXTERNAL</text>
                <text x="90" y="45" class="module-title" style="fill:#e65100">PROGRAM MEM</text>
                <text x="90" y="70" class="port-text">program_mem_read_data</text>
                <text x="90" y="85" class="port-text">program_mem_read_addr</text>
            </g>

            <g transform="translate(20, 50)">
                <rect x="0" y="0" width="200" height="180" class="memory-box"/>
                <text x="100" y="30" class="module-title">PROG MEM CTRL</text>
                <text x="100" y="45" class="label">(controller instance)</text>
                
                <rect x="15" y="60" width="170" height="20" class="register-box"/>
                <text x="20" y="74" class="register-text">consumer_read_valid</text>
                
                <rect x="15" y="85" width="170" height="20" class="register-box"/>
                <text x="20" y="99" class="register-text">consumer_read_addr</text>

                <rect x="15" y="110" width="170" height="20" class="register-box"/>
                <text x="20" y="124" class="register-text">mem_read_valid</text>

                [cite_start]<text x="100" y="155" style="font-size:10px; font-style:italic; text-anchor:middle">[cite: 46] Read Only</text>
            </g>

            <g transform="translate(260, 400)">
                <rect x="0" y="0" width="180" height="120" class="external-box"/>
                <text x="90" y="30" class="module-title" style="fill:#e65100">EXTERNAL</text>
                <text x="90" y="45" class="module-title" style="fill:#e65100">DATA MEM</text>
                <text x="90" y="70" class="port-text">data_mem_read_data</text>
                <text x="90" y="85" class="port-text">data_mem_write_data</text>
                <text x="90" y="100" class="port-text">addr / ready / valid</text>
            </g>

            <g transform="translate(20, 350)">
                <rect x="0" y="0" width="200" height="240" class="memory-box"/>
                <text x="100" y="30" class="module-title">DATA MEM CTRL</text>
                <text x="100" y="45" class="label">(controller instance)</text>

                <rect x="15" y="60" width="170" height="20" class="register-box"/>
                <text x="20" y="74" class="register-text">consumer_read_valid</text>
                
                <rect x="15" y="85" width="170" height="20" class="register-box"/>
                <text x="20" y="99" class="register-text">consumer_read_addr</text>

                <rect x="15" y="110" width="170" height="20" class="register-box"/>
                <text x="20" y="124" class="register-text">consumer_write_valid</text>

                <rect x="15" y="135" width="170" height="20" class="register-box"/>
                <text x="20" y="149" class="register-text">consumer_write_data</text>

                <rect x="15" y="170" width="170" height="20" class="register-box"/>
                <text x="20" y="184" class="register-text">mem_req_arbiter</text>
                
                [cite_start]<text x="100" y="215" style="font-size:10px; font-style:italic; text-anchor:middle">[cite: 44] Read/Write</text>
            </g>

            <line x1="220" y1="100" x2="260" y2="100" class="bus"/>
            <line x1="220" y1="460" x2="260" y2="460" class="bus"/>
        </g>

        <g transform="translate(50, 60)">
            <g transform="translate(0, 0)">
                <rect x="0" y="0" width="220" height="160" class="sub-module-box"/>
                <text x="110" y="20" class="module-title">DISPATCHER</text>
                <text x="110" y="35" class="label">(dispatch.sv)</text>
                <rect x="15" y="50" width="190" height="20" class="register-box"/>
                <text x="20" y="64" class="register-text">reg blocks_dispatched</text>
                <rect x="15" y="75" width="190" height="20" class="register-box"/>
                <text x="20" y="89" class="register-text">reg blocks_done</text>
                <rect x="15" y="100" width="190" height="20" class="register-box"/>
                <text x="20" y="114" class="register-text">reg core_start[N]</text>
            </g>

            <g transform="translate(250, 0)">
                <rect x="0" y="0" width="200" height="100" class="sub-module-box"/>
                <text x="100" y="20" class="module-title">DCR</text>
                <text x="100" y="35" class="label">(dcr.sv)</text>
                <rect x="15" y="50" width="170" height="20" class="register-box"/>
                <text x="20" y="64" class="register-text">reg device_ctrl_reg</text>
            </g>
        </g>

        <g transform="translate(50, 260)">
            <rect x="0" y="0" width="750" height="650" class="module-box" style="stroke-dasharray: 5,5"/>
            <text x="20" y="30" class="group-label">COMPUTE CORE (Instantiated in gpu.sv)</text>
            
            <g transform="translate(280, 50)">
                <rect x="0" y="0" width="190" height="150" class="sub-module-box"/>
                <text x="95" y="20" class="module-title">SCHEDULER</text>
                <text x="95" y="35" class="label">(scheduler.sv)</text>
                <rect x="10" y="50" width="170" height="20" class="register-box"/>
                <text x="15" y="64" class="register-text">reg [2:0] core_state</text>
                <rect x="10" y="75" width="170" height="20" class="register-box"/>
                <text x="15" y="89" class="register-text">reg [7:0] current_pc</text>
                [cite_start]<text x="95" y="120" style="font-size:9px; text-anchor:middle; fill:#555">FSM [cite: 154]</text>
            </g>

            <g transform="translate(30, 50)">
                <rect x="0" y="0" width="220" height="150" class="sub-module-box"/>
                <text x="110" y="20" class="module-title">FETCHER</text>
                <text x="110" y="35" class="label">(fetcher.sv)</text>
                <rect x="15" y="50" width="190" height="20" class="register-box"/>
                <text x="20" y="64" class="register-text">reg [2:0] fetcher_state</text>
                <rect x="15" y="75" width="190" height="20" class="register-box"/>
                <text x="20" y="89" class="register-text">reg [15:0] instruction</text>
                <rect x="15" y="100" width="190" height="20" class="register-box"/>
                <text x="20" y="114" class="register-text">reg mem_read_valid</text>
            </g>

            <g transform="translate(500, 50)">
                <rect x="0" y="0" width="220" height="200" class="sub-module-box"/>
                <text x="110" y="20" class="module-title">DECODER</text>
                <text x="110" y="35" class="label">(decoder.sv)</text>
                <rect x="15" y="50" width="190" height="20" class="register-box"/>
                <text x="20" y="64" class="register-text">reg [3:0] rd/rs/rt</text>
                <rect x="15" y="75" width="190" height="20" class="register-box"/>
                <text x="20" y="89" class="register-text">reg immediate/nzp</text>
                <rect x="15" y="125" width="190" height="50" class="register-box" style="fill:#eee"/>
                <text x="20" y="140" class="register-text" style="font-weight:bold">Control Signals:</text>
                <text x="20" y="155" class="register-text">reg_write, mem_en...</text>
            </g>

            <rect x="20" y="270" width="700" height="350" style="fill:none; stroke:#999; stroke-dasharray:4; stroke-width:1"/>
            <text x="40" y="290" class="group-label">THREAD EXECUTION UNITS (x THREADS_PER_BLOCK)</text>

            <g transform="translate(30, 310)">
                <rect x="0" y="0" width="150" height="120" class="sub-module-box"/>
                <text x="75" y="20" class="module-title">PC</text>
                <text x="75" y="35" class="label">(pc.sv)</text>
                <rect x="10" y="50" width="130" height="20" class="register-box"/>
                <text x="15" y="64" class="register-text">reg [7:0] next_pc</text>
                <rect x="10" y="75" width="130" height="20" class="register-box"/>
                <text x="15" y="89" class="register-text">reg [2:0] nzp</text>
            </g>

            <g transform="translate(200, 310)">
                <rect x="0" y="0" width="180" height="200" class="sub-module-box"/>
                <text x="90" y="20" class="module-title">REG FILE</text>
                <text x="90" y="35" class="label">(registers.sv)</text>
                <rect x="10" y="50" width="160" height="20" class="register-box"/>
                <text x="15" y="64" class="register-text">reg rs / rt</text>
                <rect x="10" y="80" width="160" height="100" style="fill:#fff; stroke:#000;"/>
                <text x="15" y="100" class="register-text" style="font-weight:bold">registers[15:0]</text>
                <text x="15" y="115" class="register-text">R0-R12 (Free)</text>
                <text x="15" y="130" class="register-text">R13-R15 (Sys)</text>
            </g>

            <g transform="translate(400, 310)">
                <rect x="0" y="0" width="140" height="120" class="sub-module-box"/>
                <text x="70" y="20" class="module-title">ALU</text>
                <text x="70" y="35" class="label">(alu.sv)</text>
                <path d="M20,50 L120,50 L100,100 L40,100 Z" style="fill:none; stroke:#000"/>
                <rect x="10" y="90" width="120" height="20" class="register-box"/>
                <text x="15" y="104" class="register-text">reg alu_out</text>
            </g>

            <g transform="translate(560, 310)">
                <rect x="0" y="0" width="150" height="180" class="sub-module-box"/>
                <text x="75" y="20" class="module-title">LSU</text>
                <text x="75" y="35" class="label">(lsu.sv)</text>
                <rect x="10" y="50" width="130" height="20" class="register-box"/>
                <text x="15" y="64" class="register-text">reg lsu_state</text>
                <rect x="10" y="75" width="130" height="20" class="register-box"/>
                <text x="15" y="89" class="register-text">reg lsu_out</text>
                <rect x="10" y="100" width="130" height="20" class="register-box"/>
                <text x="15" y="114" class="register-text">reg mem_wr_val</text>
            </g>
        </g>

        <path d="M 300 310 L 300 150 L 870 150" stroke="#1a73e8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <text x="800" y="145" class="label" style="fill:#1a73e8">Instruction Request</text>

        <path d="M 800 570 L 830 570 L 830 450 L 870 450" stroke="#1a73e8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
        <text x="820" y="440" class="label" style="fill:#1a73e8">Data Load/Store</text>

    </svg>
    
    <div style="margin-top: 20px; font-size: 12px; color: #555;">
        <strong>Legend:</strong>
        <span style="display:inline-block; width:10px; height:10px; background:#fff; border:1px solid #000; margin-left:10px;"></span> Logic Module
        <span style="display:inline-block; width:10px; height:10px; background:#e0e0e0; border:1px solid #333; margin-left:10px;"></span> Internal Register
        <span style="display:inline-block; width:10px; height:10px; background:#e8f0fe; border:1px solid #1a73e8; margin-left:10px;"></span> Memory Controller
        <span style="display:inline-block; width:10px; height:10px; background:#fff3e0; border:1px solid #e65100; margin-left:10px;"></span> External Interface
    </div>
</div>

</body>
</html>
